<div class="relative w-full">
  <mat-form-field appearance="outline" class="destination-field w-full">
    <span matPrefix class="material-symbols-outlined ml-3 mr-2 text-[#7ae0c3]">travel_explore</span>
    <mat-label>Search a city, island or region</mat-label>
    <input matInput type="text" [(ngModel)]="query" (ngModelChange)="onInput()" [maxlength]="200"
           placeholder="Try Kyoto, Santorini or the Swiss Alps" autocomplete="off">
    <span matSuffix *ngIf="imageLoading" class="mr-4"><mat-spinner diameter="18"></mat-spinner></span>
  </mat-form-field>

  <div *ngIf="rateLimitError"
       class="mt-2 flex items-center gap-2 rounded-2xl border border-[#ffc96b]/20 bg-[#ffc96b]/10 px-4 py-3 text-sm text-[#ffd996]">
    <span class="material-symbols-outlined text-base">warning</span>{{ rateLimitError }}
  </div>

  <div *ngIf="showSuggestions && suggestions.length > 0"
       class="glass-panel relative mt-2 w-full overflow-hidden rounded-[20px] p-1">
    <button type="button" *ngFor="let suggestion of suggestions; let i = index"
            (click)="selectSuggestion(suggestion, $event)"
            class="flex w-full items-center gap-3 rounded-2xl px-4 py-3 text-left text-sm transition"
            [class]="i === activeIndex ? 'bg-[#7ae0c3]/15 text-white' : 'text-[#b2c2ca] hover:bg-white/5'">
      <span class="material-symbols-outlined text-base text-[#7ae0c3]">location_on</span>
      <span>
        <ng-container *ngFor="let part of getHighlightedParts(suggestion, query)">
          <strong *ngIf="part.highlight" class="font-extrabold text-[#a5ecd7]">{{ part.text }}</strong>
          <span *ngIf="!part.highlight">{{ part.text }}</span>
        </ng-container>
      </span>
    </button>
  </div>

  <div *ngIf="imageLoading || imageUrl || imageError" class="mt-4 overflow-hidden rounded-[22px]">
    <div *ngIf="imageLoading && !imageUrl" class="h-48 animate-pulse bg-white/5"></div>
    <div *ngIf="imageUrl && !imageError" class="relative h-52">
      <img [src]="imageUrl" loading="lazy" alt="Destination preview" (error)="imageError = true; imageUrl = null"
           class="h-full w-full object-cover">
      <div class="absolute inset-0 bg-gradient-to-t from-[#071721]/80 to-transparent"></div>
      <p class="absolute bottom-4 left-4 text-xs font-bold uppercase tracking-[0.16em] text-white">A first look at {{ query }}</p>
    </div>
    <div *ngIf="imageError" class="grid h-44 place-items-center bg-white/5 text-center text-[#78919d]">
      <div><span class="material-symbols-outlined text-4xl">image_not_supported</span><p class="mt-2 text-xs">Preview unavailable</p></div>
    </div>
  </div>

  <div *ngIf="attractionsLoading || attractions.length > 0 || attractionsError" class="mt-5">
    <div *ngIf="attractionsLoading" class="space-y-2">
      <div *ngFor="let _ of [1,2,3]" class="h-16 animate-pulse rounded-2xl bg-white/5"></div>
    </div>

    <div *ngIf="attractionsError && !attractionsLoading"
         class="rounded-2xl border border-[#ff8d70]/20 bg-[#ff8d70]/10 p-3 text-sm text-[#ffb4a1]">
      {{ attractionsError }}
    </div>

    <div *ngIf="attractions.length > 0 && !attractionsLoading">
      <p class="mb-3 text-[10px] font-extrabold uppercase tracking-[0.18em] text-[#6f8996]">Signature stops</p>
      <div class="grid gap-2 sm:grid-cols-3">
        <article *ngFor="let attraction of attractions" class="rounded-2xl border border-white/10 bg-white/[0.035] p-4">
          <span class="material-symbols-outlined text-lg text-[#ffc96b]">star</span>
          <p class="mt-3 text-sm font-bold text-white">{{ attraction.name }}</p>
          <p class="mt-1 text-xs leading-5 text-[#7e96a2]">{{ attraction.description }}</p>
        </article>
      </div>
    </div>
  </div>
</div>
