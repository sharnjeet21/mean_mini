<nav class="fixed top-0 w-full z-50 bg-surface-container-low/90 backdrop-blur-xl shadow-[0_2px_16px_rgba(31,27,16,0.07)]">
  <div class="flex justify-between items-center h-16 px-6 lg:px-12 w-full mx-auto max-w-screen-2xl">

    <!-- Brand -->
    <div class="flex items-center gap-8">
      <a routerLink="/" class="text-2xl font-extrabold tracking-tighter text-[#FF6B6B] font-headline">
        Wanderer
      </a>

      <!-- Desktop Nav Links -->
      <div class="hidden md:flex gap-6 items-center text-sm font-medium font-headline">
        <a routerLink="/home"
           routerLinkActive="!text-primary font-bold border-b-2 border-primary pb-1"
           [routerLinkActiveOptions]="{exact:true}"
           class="text-on-surface-variant hover:text-primary transition-colors">Home</a>
        <a *ngIf="auth.isLoggedIn"
           routerLink="/dashboard"
           routerLinkActive="!text-primary font-bold border-b-2 border-primary pb-1"
           class="text-on-surface-variant hover:text-primary transition-colors">Dashboard</a>
        <a routerLink="/about"
           routerLinkActive="!text-primary font-bold border-b-2 border-primary pb-1"
           class="text-on-surface-variant hover:text-primary transition-colors">About</a>
        <a *ngIf="auth.isAdmin"
           routerLink="/admin"
           routerLinkActive="!text-primary font-bold border-b-2 border-primary pb-1"
           class="text-on-surface-variant hover:text-primary transition-colors">Admin</a>
      </div>
    </div>

    <!-- Right Side -->
    <div class="flex items-center gap-4">

      <!-- Not logged in -->
      <ng-container *ngIf="!auth.isLoggedIn">
        <a routerLink="/login"
           class="text-on-surface-variant font-medium text-sm hover:text-primary transition-colors cursor-pointer">
          Login
        </a>
        <a routerLink="/register"
           class="bg-primary text-on-primary px-5 py-2 rounded-full text-sm font-semibold
                  active:scale-95 transform transition-transform shadow-lg cursor-pointer">
          Register
        </a>
      </ng-container>

      <!-- Logged in -->
      <ng-container *ngIf="auth.isLoggedIn">
        <div class="hidden sm:flex items-center gap-3 pl-4 border-l border-outline-variant">
          <span class="text-sm font-medium text-on-surface-variant">{{ auth.currentUser()?.name }}</span>
          <span class="px-2 py-0.5 rounded-full text-xs font-bold bg-secondary-container text-on-secondary-container capitalize">
            {{ auth.currentUser()?.role }}
          </span>
        </div>
        <button (click)="auth.logout()"
                class="w-9 h-9 rounded-full bg-primary flex items-center justify-center
                       text-on-primary text-xs font-bold cursor-pointer hover:opacity-80 transition-opacity"
                title="Logout">
          {{ initials }}
        </button>
      </ng-container>

    </div>
  </div>
  <!-- Bottom border line -->
  <div class="bg-outline-variant/20 h-px w-full absolute bottom-0"></div>
</nav>
<!-- Spacer to push content below the fixed navbar -->
<div class="h-16"></div>
