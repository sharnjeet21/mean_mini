<nav class="fixed inset-x-0 top-0 z-50 px-3 pt-3 sm:px-5">
  <div class="glass-panel mx-auto flex h-[68px] max-w-7xl items-center justify-between rounded-[22px] px-4 sm:px-6">
    <a routerLink="/" (click)="closeMobile()" class="flex items-center gap-3">
      <span class="grid h-10 w-10 place-items-center rounded-2xl bg-[#7ae0c3] text-[#05201f] shadow-[0_10px_28px_rgba(69,210,184,.22)]">
        <span class="material-symbols-outlined">near_me</span>
      </span>
      <span class="hidden sm:block">
        <strong class="block font-headline text-[15px] tracking-[-0.02em] text-white">The Elevated Navigator</strong>
        <span class="block text-[9px] font-bold uppercase tracking-[0.22em] text-[#86a1af]">Travel intelligence</span>
      </span>
    </a>

    <div class="hidden items-center gap-1 rounded-full border border-white/10 bg-black/10 p-1 md:flex">
      <a mat-button routerLink="/home" routerLinkActive="!bg-white/10 !text-white"
         [routerLinkActiveOptions]="{exact:true}" class="!rounded-full !px-4 !text-xs !font-semibold !text-[#9fb0ba]">Home</a>
      <a mat-button routerLink="/dashboard" routerLinkActive="!bg-white/10 !text-white"
         class="!rounded-full !px-4 !text-xs !font-semibold !text-[#9fb0ba]">Trips</a>
      <a mat-button routerLink="/about" routerLinkActive="!bg-white/10 !text-white"
         class="!rounded-full !px-4 !text-xs !font-semibold !text-[#9fb0ba]">Platform</a>
      <a *ngIf="auth.isAdmin" mat-button routerLink="/admin" routerLinkActive="!bg-white/10 !text-white"
        class="!rounded-full !px-4 !text-xs !font-semibold !text-[#9fb0ba]">Trip Manager</a>
    </div>

    <div class="flex items-center gap-2">
      <ng-container *ngIf="!auth.isLoggedIn">
        <a mat-button routerLink="/login" class="!hidden !rounded-full !text-[#c4d3da] sm:!inline-flex">Sign in</a>
        <a mat-flat-button routerLink="/register" class="primary-action !min-h-10 !px-5">Start planning</a>
      </ng-container>

      <ng-container *ngIf="auth.isLoggedIn">
        <div class="hidden text-right lg:block">
          <p class="text-xs font-bold text-white">{{ auth.currentUser()?.name }}</p>
          <p class="text-[9px] uppercase tracking-[0.18em] text-[#7f98a6]">
            {{ auth.currentUser()?.role === 'admin' ? 'trip manager' : auth.currentUser()?.role }}
          </p>
        </div>
        <button mat-button matTooltip="Sign out" (click)="auth.logout()"
                class="!h-10 !min-w-10 !rounded-full !bg-[#7ae0c3] !p-0 !font-extrabold !text-[#05201f]">
          {{ initials }}
        </button>
      </ng-container>

      <button mat-button class="!h-10 !min-w-10 !rounded-full !p-0 !text-white md:!hidden"
              (click)="mobileOpen = !mobileOpen" [attr.aria-expanded]="mobileOpen" aria-label="Toggle navigation">
        <span class="material-symbols-outlined">{{ mobileOpen ? 'close' : 'menu' }}</span>
      </button>
    </div>
  </div>

  <div *ngIf="mobileOpen" class="glass-panel mx-auto mt-2 max-w-7xl rounded-[22px] p-3 md:hidden">
    <a mat-button routerLink="/home" (click)="closeMobile()" class="!w-full !justify-start !rounded-xl !text-[#dfeef3]">Home</a>
    <a mat-button routerLink="/dashboard" (click)="closeMobile()" class="!w-full !justify-start !rounded-xl !text-[#dfeef3]">Trips</a>
    <a mat-button routerLink="/about" (click)="closeMobile()" class="!w-full !justify-start !rounded-xl !text-[#dfeef3]">Platform</a>
    <a *ngIf="auth.isAdmin" mat-button routerLink="/admin" (click)="closeMobile()" class="!w-full !justify-start !rounded-xl !text-[#dfeef3]">Trip Manager</a>
    <a *ngIf="!auth.isLoggedIn" mat-button routerLink="/login" (click)="closeMobile()" class="!w-full !justify-start !rounded-xl !text-[#dfeef3]">Sign in</a>
  </div>
</nav>
