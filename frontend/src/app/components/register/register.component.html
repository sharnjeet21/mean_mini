<div class="min-h-[calc(100vh-4rem)] flex flex-col items-center justify-center relative px-4 py-12">
<!-- Background Decorative Elements -->
<div class="fixed inset-0 pointer-events-none overflow-hidden">
  <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary-container/5 blur-[120px]"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-tertiary-container/5 blur-[120px]"></div>
</div>

<!-- Registration Card -->
<main class="relative w-full max-w-md z-10">
  <div class="bg-surface-container-lowest rounded-xl editorial-shadow p-8 md:p-12 transition-all duration-500 hover:shadow-[0_20px_50px_rgba(31,27,16,0.08)]">
    <!-- Brand & Header -->
    <div class="text-center mb-10">
      <span class="text-3xl font-extrabold tracking-tighter text-primary font-headline">Wanderer</span>
      <h1 class="text-3xl font-extrabold text-on-surface font-headline tracking-tight mb-2 mt-2">Begin your story</h1>
      <p class="text-on-surface-variant font-body text-sm">Join our community of digital curators and start planning your next escape.</p>
    </div>

    <!-- Error alert -->
    <div *ngIf="error" class="mb-6 px-4 py-3 rounded-xl bg-error-container text-on-error-container text-sm font-medium flex items-center gap-2">
      <span class="material-symbols-outlined text-lg">error</span>
      {{ error }}
    </div>

    <!-- Form -->
    <form (ngSubmit)="onRegister()" #regForm="ngForm" class="space-y-6">
      <!-- Name Field -->
      <div class="space-y-1.5">
        <label class="block text-xs font-semibold uppercase tracking-widest text-on-surface-variant font-label ml-1" for="name">Full Name</label>
        <div class="relative group">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px] transition-colors group-focus-within:text-primary">person</span>
          <input id="name" name="name" type="text" required
                 [(ngModel)]="name"
                 placeholder="John Doe"
                 class="w-full pl-12 pr-4 py-4 bg-surface-container-highest/50 border-none rounded-full font-body text-on-surface placeholder:text-outline/60 focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all"/>
        </div>
      </div>

      <!-- Email Field -->
      <div class="space-y-1.5">
        <label class="block text-xs font-semibold uppercase tracking-widest text-on-surface-variant font-label ml-1" for="email">Email Address</label>
        <div class="relative group">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px] transition-colors group-focus-within:text-primary">mail</span>
          <input id="email" name="email" type="email" required
                 [(ngModel)]="email"
                 placeholder="hello@wanderer.com"
                 class="w-full pl-12 pr-4 py-4 bg-surface-container-highest/50 border-none rounded-full font-body text-on-surface placeholder:text-outline/60 focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all"/>
        </div>
      </div>

      <!-- Password Field -->
      <div class="space-y-1.5">
        <label class="block text-xs font-semibold uppercase tracking-widest text-on-surface-variant font-label ml-1" for="password">Password</label>
        <div class="relative group">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px] transition-colors group-focus-within:text-primary">lock</span>
          <input id="password" name="password"
                 [type]="showPassword ? 'text' : 'password'"
                 required
                 [(ngModel)]="password"
                 placeholder="••••••••"
                 class="w-full pl-12 pr-12 py-4 bg-surface-container-highest/50 border-none rounded-full font-body text-on-surface placeholder:text-outline/60 focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all"/>
          <button type="button" (click)="showPassword = !showPassword"
                  class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors">
            <span class="material-symbols-outlined text-xl">{{ showPassword ? 'visibility_off' : 'visibility' }}</span>
          </button>
        </div>
      </div>

      <!-- Confirm Password Field -->
      <div class="space-y-1.5">
        <label class="block text-xs font-semibold uppercase tracking-widest text-on-surface-variant font-label ml-1" for="confirmPassword">Confirm Password</label>
        <div class="relative group">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px] transition-colors group-focus-within:text-primary">lock_reset</span>
          <input id="confirmPassword" name="confirmPassword"
                 [type]="showPassword ? 'text' : 'password'"
                 required
                 [(ngModel)]="confirmPassword"
                 placeholder="••••••••"
                 class="w-full pl-12 pr-4 py-4 bg-surface-container-highest/50 border-none rounded-full font-body text-on-surface placeholder:text-outline/60 focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all"/>
        </div>
      </div>

      <!-- CTA -->
      <div class="pt-2">
        <button type="submit"
                [disabled]="loading"
                class="w-full py-4 px-6 signature-gradient text-on-primary font-headline font-bold rounded-full shadow-lg shadow-primary/20 hover:shadow-xl hover:shadow-primary/30 active:scale-[0.98] transition-all duration-300 flex items-center justify-center gap-2 disabled:opacity-60">
          <span *ngIf="loading" class="material-symbols-outlined animate-spin text-xl">progress_activity</span>
          <span *ngIf="!loading">Create Account</span>
        </button>
      </div>
    </form>

    <!-- Footer Link -->
    <p class="mt-10 text-center font-body text-sm text-on-surface-variant">
      Already have a journal?
      <a routerLink="/login" class="text-primary font-bold hover:underline underline-offset-4 decoration-primary/30 transition-all">Login</a>
    </p>
  </div>

  <!-- Decorative quote -->
  <div class="mt-12 text-center px-4">
    <p class="italic text-on-surface-variant/60 font-body text-sm leading-relaxed">
      "The world is a book and those who do not travel read only one page."
    </p>
  </div>
</main>
</div>
