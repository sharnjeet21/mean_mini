<div class="min-h-screen bg-[#f8f9fa] flex items-center justify-center p-6 relative overflow-hidden">
  <!-- Ambient blobs -->
  <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-[#3953bd]/5 blur-[120px]"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-[#754aa1]/5 blur-[120px]"></div>

  <div class="w-full max-w-[480px] z-10">
    <!-- Brand -->
    <div class="text-center mb-10">
      <div class="inline-flex items-center justify-center mb-4">
        <span class="material-symbols-outlined text-4xl text-[#3953bd]" style="font-variation-settings:'FILL' 1">explore</span>
      </div>
      <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-[#667eea] to-[#764ba2] bg-clip-text text-transparent" style="font-family:Manrope,sans-serif">
        The Elevated Navigator
      </h1>
      <p class="text-[#444653] mt-2 font-medium">Welcome back to your next adventure.</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-xl p-8 lg:p-10 shadow-[0_12px_32px_-4px_rgba(25,28,29,0.06)] border border-[#c5c5d5]/20">
      <form (ngSubmit)="onSubmit()" class="space-y-6">
        <!-- Error -->
        <div *ngIf="error" class="flex items-center gap-2 p-3 rounded-lg bg-[#ffdad6] text-[#93000a] text-sm">
          <span class="material-symbols-outlined text-sm" style="font-variation-settings:'FILL' 1">error</span>
          {{ error }}
        </div>

        <!-- Email -->
        <div class="space-y-2">
          <label class="block text-sm font-semibold text-[#191c1d] ml-1" style="font-family:Manrope,sans-serif">Email Address</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <span class="material-symbols-outlined text-[#444653]">mail</span>
            </div>
            <input [(ngModel)]="email" name="email" type="email" placeholder="you@example.com" required
              class="block w-full pl-10 pr-3 py-3 border-0 border-b-2 border-[#c5c5d5] bg-transparent focus:ring-0 focus:border-[#3953bd] transition-all duration-300 placeholder:text-[#757684] text-[#191c1d] text-sm outline-none">
          </div>
        </div>

        <!-- Password -->
        <div class="space-y-2">
          <div class="flex justify-between items-center">
            <label class="block text-sm font-semibold text-[#191c1d] ml-1" style="font-family:Manrope,sans-serif">Password</label>
            <a href="#" class="text-xs font-semibold text-[#754aa1] hover:text-[#3953bd] transition-colors">Forgot password?</a>
          </div>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <span class="material-symbols-outlined text-[#757684]">lock</span>
            </div>
            <input [(ngModel)]="password" name="password" [type]="showPassword ? 'text' : 'password'" placeholder="••••••••" required
              class="block w-full pl-10 pr-10 py-3 border-0 border-b border-[#c5c5d5]/40 bg-transparent focus:ring-0 focus:border-b-2 focus:border-[#3953bd] transition-all duration-300 placeholder:text-[#757684] text-[#191c1d] text-sm outline-none">
            <button type="button" (click)="showPassword = !showPassword" class="absolute inset-y-0 right-0 pr-3 flex items-center text-[#757684] hover:text-[#444653]">
              <span class="material-symbols-outlined text-[20px]">{{ showPassword ? 'visibility_off' : 'visibility' }}</span>
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" [disabled]="loading"
          class="signature-gradient w-full flex justify-center py-4 px-4 rounded-xl text-white font-bold text-sm tracking-wide shadow-lg shadow-[#3953bd]/20 hover:scale-[1.01] active:scale-[0.98] transition-all duration-200 disabled:opacity-60"
          style="font-family:Manrope,sans-serif">
          {{ loading ? 'Signing in...' : 'Login to Dashboard' }}
        </button>
      </form>

      <!-- Divider -->
      <div class="mt-8 relative">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-[#c5c5d5]/30"></div>
        </div>
        <div class="relative flex justify-center text-xs">
          <span class="px-3 bg-white text-[#c5c5d5] uppercase tracking-[0.2em] font-bold">Or continue with</span>
        </div>
      </div>

      <!-- Social -->
      <div class="mt-6 grid grid-cols-2 gap-4">
        <button class="flex items-center justify-center py-3 px-4 rounded-xl bg-[#f3f4f5] border border-[#c5c5d5]/10 hover:bg-[#e7e8e9] transition-colors text-sm font-semibold text-[#444653]">
          <span class="material-symbols-outlined mr-2 text-[#3953bd]">mail</span> Google
        </button>
        <button class="flex items-center justify-center py-3 px-4 rounded-xl bg-[#f3f4f5] border border-[#c5c5d5]/10 hover:bg-[#e7e8e9] transition-colors text-sm font-semibold text-[#444653]">
          <span class="material-symbols-outlined mr-2">travel_explore</span> Passport
        </button>
      </div>
    </div>

    <p class="mt-8 text-center text-sm font-medium text-[#444653]">
      Don't have an account?
      <a routerLink="/register" class="text-[#3953bd] font-bold hover:underline decoration-2 underline-offset-4 ml-1">Register for early access</a>
    </p>

    <div class="mt-8 flex justify-center gap-6 text-[10px] font-bold text-[#c5c5d5] uppercase tracking-widest">
      <a href="#" class="hover:text-[#3953bd] transition-colors">Privacy Policy</a>
      <a href="#" class="hover:text-[#3953bd] transition-colors">Terms of Service</a>
      <a href="#" class="hover:text-[#3953bd] transition-colors">Contact Support</a>
    </div>
  </div>
</div>
