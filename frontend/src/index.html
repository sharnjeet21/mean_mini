<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>The Elevated Navigator | Travel Itinerary Planner</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <!-- Fonts: Plus Jakarta Sans & Be Vietnam Pro -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Material Symbols -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <!-- Tailwind CSS CDN with full config -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary-container": "#ff6b6b",
            "surface-bright": "#fff8ef",
            "surface-container-low": "#fcf3e0",
            "on-primary-fixed-variant": "#8c1520",
            "secondary-container": "#f4dbf3",
            "on-primary": "#ffffff",
            "background": "#fff8ef",
            "surface-container": "#f6edda",
            "secondary-fixed": "#f4dbf3",
            "on-primary-container": "#6d0010",
            "primary-fixed-dim": "#ffb3b0",
            "tertiary": "#8e4e14",
            "on-tertiary-container": "#522800",
            "surface-container-highest": "#ebe2cf",
            "on-tertiary-fixed": "#2f1400",
            "on-secondary": "#ffffff",
            "on-error-container": "#93000a",
            "on-secondary-container": "#715e72",
            "inverse-on-surface": "#f9f0dd",
            "surface-container-high": "#f0e7d4",
            "outline-variant": "#e0bfbd",
            "surface-tint": "#ae2f34",
            "tertiary-fixed": "#ffdcc4",
            "error-container": "#ffdad6",
            "on-secondary-fixed-variant": "#524154",
            "surface-dim": "#e2d9c7",
            "secondary-fixed-dim": "#d7bfd6",
            "inverse-primary": "#ffb3b0",
            "on-surface": "#1f1b10",
            "inverse-surface": "#343023",
            "on-tertiary": "#ffffff",
            "outline": "#8c706f",
            "surface": "#fff8ef",
            "primary-fixed": "#ffdad8",
            "surface-variant": "#ebe2cf",
            "on-secondary-fixed": "#251627",
            "error": "#ba1a1a",
            "tertiary-fixed-dim": "#ffb780",
            "primary": "#ae2f34",
            "tertiary-container": "#d6894a",
            "on-primary-fixed": "#410006",
            "on-surface-variant": "#584140",
            "secondary": "#6b586c",
            "surface-container-lowest": "#ffffff",
            "on-error": "#ffffff",
            "on-background": "#1f1b10",
            "on-tertiary-fixed-variant": "#6f3800"
          },
          fontFamily: {
            "headline": ["Plus Jakarta Sans"],
            "body": ["Be Vietnam Pro"],
            "label": ["Be Vietnam Pro"]
          },
          borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
        },
      },
    }
  </script>
  <style>
    body {
        font-family: 'Be Vietnam Pro', sans-serif;
        background-color: #fff8ef;
        color: #1f1b10;
    }
    .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .editorial-shadow {
        box-shadow: 0 8px 24px rgba(31, 27, 16, 0.05);
    }
    .signature-gradient {
        background: linear-gradient(135deg, #ae2f34 0%, #ff6b6b 100%);
    }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #ae2f34; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #ff6b6b; }
  </style>
</head>
<body class="bg-surface font-body text-on-surface selection:bg-primary-container selection:text-on-primary-container min-h-screen">
  <app-root></app-root>
</body>
</html>
