<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard | Travel Itinerary Planner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #f4f6fb;
    }
    .section-card {
      border: none;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }
    .itinerary-card {
      border: none;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="/">Travel Itinerary Planner</a>
      <div class="ms-auto d-flex gap-2">
        <a class="btn btn-outline-light" href="/login">Login</a>
        <a class="btn btn-outline-light" href="/register">Register</a>
      </div>
    </div>
  </nav>

  <div class="container my-5">
    <div class="row g-4 align-items-stretch">
      <div class="col-12 col-lg-5">
        <div class="card section-card p-4 h-100">
          <h3 class="fw-bold mb-2">Welcome to your dashboard</h3>
          <p class="text-muted">Add new trips and keep your travel plans organized.</p>

          <form id="itineraryForm" class="mt-3">
            <div class="mb-3">
              <label class="form-label" for="destination">Destination</label>
              <input type="text" class="form-control" id="destination" name="destination" required>
            </div>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label" for="startDate">Start Date</label>
                <input type="date" class="form-control" id="startDate" name="startDate" required>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label" for="endDate">End Date</label>
                <input type="date" class="form-control" id="endDate" name="endDate" required>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label" for="budget">Budget (₹)</label>
              <input type="number" class="form-control" id="budget" name="budget" min="0" required>
            </div>
            <div class="mb-3">
              <label class="form-label" for="notes">Notes</label>
              <textarea class="form-control" id="notes" name="notes" rows="3" placeholder="Optional"></textarea>
            </div>
            <button type="submit" class="btn btn-primary w-100">Add Itinerary</button>
          </form>
        </div>
      </div>

      <div class="col-12 col-lg-7">
        <div class="d-flex align-items-center justify-content-between mb-3">
          <h4 class="fw-bold mb-0">Your Itineraries</h4>
          <span class="badge text-bg-primary" id="itineraryCount">0</span>
        </div>
        <div id="itineraryList" class="row g-3"></div>
      </div>
    </div>
  </div>

  <script>
    const itineraryList = document.getElementById("itineraryList");
    const itineraryCount = document.getElementById("itineraryCount");

    const formatDate = (value) => {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      return date.toLocaleDateString("en-IN", { year: "numeric", month: "short", day: "numeric" });
    };

    const renderItineraries = (items) => {
      itineraryCount.textContent = items.length;

      if (!items.length) {
        itineraryList.innerHTML = "<p class='text-muted'>No itineraries yet. Add your first trip!</p>";
        return;
      }

      itineraryList.innerHTML = items
        .map(
          (item) => `
            <div class="col-12">
              <div class="card itinerary-card p-3">
                <div class="card-body">
                  <div class="d-flex justify-content-between flex-wrap gap-2">
                    <div>
                      <h5 class="card-title fw-bold">${item.destination}</h5>
                      <p class="text-muted mb-2">${formatDate(item.startDate)} - ${formatDate(item.endDate)}</p>
                    </div>
                    <div class="text-end">
                      <span class="badge text-bg-success">Budget: ₹${item.budget}</span>
                    </div>
                  </div>
                  <p class="mb-3">${item.notes || "No notes"}</p>
                  <div class="d-flex gap-2">
                    <button class="btn btn-outline-primary btn-sm" data-action="edit" data-id="${item._id}" data-destination="${item.destination}" data-startdate="${item.startDate}" data-enddate="${item.endDate}" data-budget="${item.budget}" data-notes="${item.notes || ""}">Edit</button>
                    <button class="btn btn-outline-danger btn-sm" data-action="delete" data-id="${item._id}">Delete</button>
                  </div>
                </div>
              </div>
            </div>
          `
        )
        .join("");
    };

    const loadItineraries = async () => {
      try {
        const response = await fetch("/api/itinerary");
        const data = await response.json();
        renderItineraries(Array.isArray(data) ? data : []);
      } catch (error) {
        console.error(error);
      }
    };

    document.getElementById("itineraryForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const formData = new FormData(event.target);
      const payload = Object.fromEntries(formData.entries());
      payload.budget = Number(payload.budget);

      try {
        const response = await fetch("/api/itinerary", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        if (!response.ok) {
          const error = await response.json();
          alert(error.message || "Unable to add itinerary.");
          return;
        }

        event.target.reset();
        loadItineraries();
      } catch (error) {
        console.error(error);
      }
    });

    itineraryList.addEventListener("click", async (event) => {
      const action = event.target.getAttribute("data-action");
      const id = event.target.getAttribute("data-id");

      if (!action || !id) return;

      if (action === "delete") {
        if (!confirm("Delete this itinerary?")) return;
        await fetch(`/api/itinerary/${id}`, { method: "DELETE" });
        loadItineraries();
        return;
      }

      if (action === "edit") {
        const destination = prompt("Destination", event.target.getAttribute("data-destination"));
        if (destination === null) return;
        const startDate = prompt("Start Date (YYYY-MM-DD)", event.target.getAttribute("data-startdate").slice(0, 10));
        if (startDate === null) return;
        const endDate = prompt("End Date (YYYY-MM-DD)", event.target.getAttribute("data-enddate").slice(0, 10));
        if (endDate === null) return;
        const budget = prompt("Budget", event.target.getAttribute("data-budget"));
        if (budget === null) return;
        const notes = prompt("Notes", event.target.getAttribute("data-notes"));
        if (notes === null) return;

        await fetch(`/api/itinerary/${id}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ destination, startDate, endDate, budget: Number(budget), notes }),
        });

        loadItineraries();
      }
    });

    loadItineraries();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
