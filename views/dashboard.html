<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard | Travel Itinerary Planner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #f4f6fb;
    }
    .section-card {
      border: none;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }
    .itinerary-card {
      border: none;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="/">Travel Itinerary Planner</a>
      <div class="ms-auto d-flex gap-2">
        <span class="navbar-text text-light me-3" id="userInfo">Loading...</span>
        <button class="btn btn-outline-light" id="logoutBtn">Logout</button>
      </div>
    </div>
  </nav>

  <div class="container my-5">
    <!-- Role-based content will be loaded here -->
    <div id="dashboardContent">
      <div class="text-center">
        <div class="spinner-border" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
        <p class="mt-2">Loading dashboard...</p>
      </div>
    </div>
  </div>

  <script>
    let currentUser = null;
    let sessionId = null;

    // Check authentication on page load
    document.addEventListener('DOMContentLoaded', async function() {
      sessionId = localStorage.getItem('sessionId');
      const userData = localStorage.getItem('user');
      
      if (!sessionId || !userData) {
        redirectToLogin();
        return;
      }
      
      try {
        currentUser = JSON.parse(userData);
        await loadUserProfile();
        loadDashboardContent();
      } catch (error) {
        console.error('Auth error:', error);
        redirectToLogin();
      }
    });

    async function loadUserProfile() {
      try {
        const response = await fetch('/api/auth/profile', {
          headers: {
            'x-session-id': sessionId
          }
        });
        
        if (!response.ok) {
          throw new Error('Session expired');
        }
        
        const result = await response.json();
        currentUser = result.user;
        
        // Update UI
        document.getElementById('userInfo').textContent = `${currentUser.name} (${currentUser.role})`;
      } catch (error) {
        console.error('Profile load error:', error);
        redirectToLogin();
      }
    }

    function loadDashboardContent() {
      const content = document.getElementById('dashboardContent');
      
      if (currentUser.role === 'superadmin') {
        content.innerHTML = getSuperadminDashboard();
        loadSuperadminData();
      } else if (currentUser.role === 'admin') {
        content.innerHTML = getAdminDashboard();
        loadAdminData();
      } else {
        content.innerHTML = getUserDashboard();
        loadUserData();
      }
    }

    function getSuperadminDashboard() {
      return `
        <div class="row g-4">
          <div class="col-12">
            <h2 class="fw-bold">Superadmin Dashboard</h2>
            <p class="text-muted">Manage users, roles, and system overview</p>
          </div>
          
          <div class="col-md-3">
            <div class="card section-card text-center p-3">
              <h5>Total Users</h5>
              <h2 class="text-primary" id="totalUsers">-</h2>
            </div>
          </div>
          <div class="col-md-3">
            <div class="card section-card text-center p-3">
              <h5>Active Users</h5>
              <h2 class="text-success" id="activeUsers">-</h2>
            </div>
          </div>
          <div class="col-md-3">
            <div class="card section-card text-center p-3">
              <h5>Total Itineraries</h5>
              <h2 class="text-info" id="totalItineraries">-</h2>
            </div>
          </div>
          <div class="col-md-3">
            <div class="card section-card text-center p-3">
              <h5>Pending Requests</h5>
              <h2 class="text-warning" id="pendingRequests">-</h2>
            </div>
          </div>
          
          <div class="col-12">
            <div class="card section-card p-4">
              <div class="d-flex justify-content-between align-items-center mb-3">
                <h4>Role Requests</h4>
                <button class="btn btn-outline-primary btn-sm" onclick="loadRoleRequests()">
                  <i class="bi bi-arrow-clockwise"></i> Refresh
                </button>
              </div>
              <div id="roleRequestsList"></div>
            </div>
          </div>
          
          <div class="col-12">
            <div class="card section-card p-4">
              <h4>User Management</h4>
              <div id="usersList"></div>
            </div>
          </div>
        </div>
      `;
    }

    function getAdminDashboard() {
      return `
        <div class="row g-4">
          <div class="col-12">
            <h2 class="fw-bold">Admin Dashboard</h2>
            <p class="text-muted">Create and manage travel itineraries</p>
          </div>
          
          <div class="col-12 col-lg-5">
            <div class="card section-card p-4 h-100">
              <h4 class="fw-bold mb-3">Create New Itinerary</h4>
              <form id="itineraryForm">
                <div class="mb-3">
                  <label class="form-label">Title</label>
                  <input type="text" class="form-control" name="title" required>
                </div>
                <div class="mb-3">
                  <label class="form-label">Destination</label>
                  <input type="text" class="form-control" name="destination" required>
                </div>
                <div class="row">
                  <div class="col-md-6 mb-3">
                    <label class="form-label">Start Date</label>
                    <input type="date" class="form-control" name="startDate" required>
                  </div>
                  <div class="col-md-6 mb-3">
                    <label class="form-label">End Date</label>
                    <input type="date" class="form-control" name="endDate" required>
                  </div>
                </div>
                <div class="mb-3">
                  <label class="form-label">Duration</label>
                  <input type="text" class="form-control" name="duration" placeholder="e.g., 4 Days / 3 Nights" required>
                </div>
                <div class="mb-3">
                  <label class="form-label">Budget (₹)</label>
                  <input type="number" class="form-control" name="budget" min="0" required>
                </div>
                <div class="mb-3">
                  <label class="form-label">Description</label>
                  <textarea class="form-control" name="description" rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-primary w-100">Create Itinerary</button>
              </form>
            </div>
          </div>

          <div class="col-12 col-lg-7">
            <div class="d-flex align-items-center justify-content-between mb-3">
              <h4 class="fw-bold mb-0">Your Itineraries</h4>
              <span class="badge text-bg-primary" id="itineraryCount">0</span>
            </div>
            <div id="itineraryList"></div>
          </div>
        </div>
      `;
    }

    function getUserDashboard() {
      return `
        <div class="row g-4">
          <div class="col-12">
            <h2 class="fw-bold">User Dashboard</h2>
            <p class="text-muted">Browse and book amazing travel itineraries</p>
            
            <div class="alert alert-info d-flex justify-content-between align-items-center">
              <div>
                <strong>Want to create itineraries?</strong> Request admin access to start creating and managing travel plans.
              </div>
              <a href="/request-admin" class="btn btn-outline-primary btn-sm">Request Admin Access</a>
            </div>
          </div>
          
          <div class="col-12">
            <div class="d-flex align-items-center justify-content-between mb-3">
              <h4 class="fw-bold mb-0">Available Itineraries</h4>
              <span class="badge text-bg-primary" id="itineraryCount">0</span>
            </div>
            <div id="itineraryList"></div>
          </div>
          
          <div class="col-12 mt-5">
            <h4 class="fw-bold mb-3">My Bookings</h4>
            <div id="bookingsList"></div>
          </div>
        </div>
      `;
    }

    async function loadSuperadminData() {
      // Load user statistics
      try {
        const response = await fetch('/api/users/stats/overview', {
          headers: { 'x-session-id': sessionId }
        });
        const stats = await response.json();
        
        document.getElementById('totalUsers').textContent = stats.totalUsers || 0;
        document.getElementById('activeUsers').textContent = stats.activeUsers || 0;
      } catch (error) {
        console.error('Error loading stats:', error);
      }

      // Load users list
      try {
        const response = await fetch('/api/users', {
          headers: { 'x-session-id': sessionId }
        });
        const users = await response.json();
        renderUsersList(users);
      } catch (error) {
        console.error('Error loading users:', error);
      }

      // Load role requests
      loadRoleRequests();
    }

    async function loadAdminData() {
      loadItineraries();
      setupItineraryForm();
    }

    async function loadUserData() {
      loadItineraries();
      loadUserBookings();
    }

    function renderUsersList(users) {
      const container = document.getElementById('usersList');
      if (!users.length) {
        container.innerHTML = '<p class="text-muted">No users found.</p>';
        return;
      }

      container.innerHTML = `
        <div class="table-responsive">
          <table class="table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              ${users.map(user => `
                <tr>
                  <td>${user.name}</td>
                  <td>${user.email}</td>
                  <td><span class="badge bg-secondary">${user.role}</span></td>
                  <td><span class="badge ${user.isActive ? 'bg-success' : 'bg-danger'}">${user.isActive ? 'Active' : 'Inactive'}</span></td>
                  <td>
                    <button class="btn btn-sm btn-outline-primary" onclick="editUserRole('${user._id}', '${user.role}')">Edit Role</button>
                    <button class="btn btn-sm btn-outline-${user.isActive ? 'warning' : 'success'}" onclick="toggleUserStatus('${user._id}', ${!user.isActive})">${user.isActive ? 'Deactivate' : 'Activate'}</button>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    async function loadItineraries() {
      try {
        const response = await fetch('/api/itinerary', {
          headers: { 'x-session-id': sessionId }
        });
        const itineraries = await response.json();
        renderItineraries(itineraries);
      } catch (error) {
        console.error('Error loading itineraries:', error);
      }
    }

    function renderItineraries(itineraries) {
      const container = document.getElementById('itineraryList');
      const countElement = document.getElementById('itineraryCount');
      
      if (countElement) countElement.textContent = itineraries.length;

      if (!itineraries.length) {
        container.innerHTML = '<p class="text-muted">No itineraries available.</p>';
        return;
      }

      container.innerHTML = itineraries.map(itinerary => `
        <div class="card itinerary-card mb-3 p-3">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-start mb-2">
              <h5 class="card-title fw-bold">${itinerary.title}</h5>
              <span class="badge bg-success">₹${itinerary.budget}</span>
            </div>
            <p class="text-muted mb-2">${itinerary.destination} • ${itinerary.duration}</p>
            <p class="mb-3">${itinerary.description || 'No description available'}</p>
            <div class="d-flex gap-2">
              ${currentUser.role === 'user' ? 
                `<button class="btn btn-primary btn-sm" onclick="bookItinerary('${itinerary._id}')">Book Now</button>` :
                `<button class="btn btn-outline-primary btn-sm" onclick="editItinerary('${itinerary._id}')">Edit</button>
                 <button class="btn btn-outline-danger btn-sm" onclick="deleteItinerary('${itinerary._id}')">Delete</button>`
              }
            </div>
          </div>
        </div>
      `).join('');
    }

    function setupItineraryForm() {
      const form = document.getElementById('itineraryForm');
      if (form) {
        form.addEventListener('submit', async function(e) {
          e.preventDefault();
          
          const formData = new FormData(this);
          const data = Object.fromEntries(formData);
          data.budget = Number(data.budget);
          
          try {
            const response = await fetch('/api/itinerary', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'x-session-id': sessionId
              },
              body: JSON.stringify(data)
            });
            
            if (response.ok) {
              this.reset();
              loadItineraries();
              showToast('Success', 'Itinerary created successfully!', 'success');
            } else {
              const error = await response.json();
              showToast('Error', error.message, 'error');
            }
          } catch (error) {
            console.error('Error creating itinerary:', error);
            showToast('Error', 'Failed to create itinerary', 'error');
          }
        });
      }
    }

    async function bookItinerary(id) {
      try {
        const response = await fetch(`/api/itinerary/${id}/book`, {
          method: 'POST',
          headers: {
            'x-session-id': sessionId
          }
        });
        
        const result = await response.json();
        if (result.success !== false) {
          showToast('Success', 'Itinerary booked successfully!', 'success');
          loadUserBookings();
        } else {
          showToast('Error', result.message, 'error');
        }
      } catch (error) {
        console.error('Booking error:', error);
        showToast('Error', 'Failed to book itinerary', 'error');
      }
    }

    async function loadUserBookings() {
      if (currentUser.role !== 'user') return;
      
      try {
        const response = await fetch('/api/itinerary/user/bookings', {
          headers: { 'x-session-id': sessionId }
        });
        const bookings = await response.json();
        renderUserBookings(bookings);
      } catch (error) {
        console.error('Error loading bookings:', error);
      }
    }

    function renderUserBookings(bookings) {
      const container = document.getElementById('bookingsList');
      if (!container) return;

      if (!bookings.length) {
        container.innerHTML = '<p class="text-muted">No bookings yet.</p>';
        return;
      }

      container.innerHTML = bookings.map(booking => `
        <div class="card mb-3 p-3">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-start">
              <div>
                <h6 class="fw-bold">${booking.title}</h6>
                <p class="text-muted mb-1">${booking.destination} • ${booking.duration}</p>
                <small class="text-muted">Booked: ${new Date(booking.userBooking.bookedAt).toLocaleDateString()}</small>
              </div>
              <span class="badge bg-${booking.userBooking.status === 'confirmed' ? 'success' : booking.userBooking.status === 'pending' ? 'warning' : 'danger'}">${booking.userBooking.status}</span>
            </div>
          </div>
        </div>
      `).join('');
    }

    // Logout functionality
    document.getElementById('logoutBtn').addEventListener('click', async function() {
      try {
        await fetch('/api/auth/logout', {
          method: 'POST',
          headers: { 'x-session-id': sessionId }
        });
      } catch (error) {
        console.error('Logout error:', error);
      } finally {
        localStorage.removeItem('sessionId');
        localStorage.removeItem('user');
        redirectToLogin();
      }
    });

    function redirectToLogin() {
      window.location.href = '/login';
    }

    function showToast(title, message, type) {
      // Create toast if it doesn't exist
      let toastContainer = document.querySelector('.toast-container');
      if (!toastContainer) {
        toastContainer = document.createElement('div');
        toastContainer.className = 'toast-container position-fixed top-0 end-0 p-3';
        document.body.appendChild(toastContainer);
      }

      const toastId = 'toast-' + Date.now();
      const toastHTML = `
        <div id="${toastId}" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
          <div class="toast-header ${type === 'success' ? 'bg-success text-white' : 'bg-danger text-white'}">
            <strong class="me-auto">${title}</strong>
            <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
          </div>
          <div class="toast-body">${message}</div>
        </div>
      `;
      
      toastContainer.insertAdjacentHTML('beforeend', toastHTML);
      const toast = new bootstrap.Toast(document.getElementById(toastId));
      toast.show();
    }

    // Global functions for admin actions
    window.editUserRole = async function(userId, currentRole) {
      const newRole = prompt('Enter new role (user, admin, superadmin):', currentRole);
      if (!newRole || !['user', 'admin', 'superadmin'].includes(newRole)) return;
      
      try {
        const response = await fetch(`/api/users/${userId}/role`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'x-session-id': sessionId
          },
          body: JSON.stringify({ role: newRole })
        });
        
        if (response.ok) {
          loadSuperadminData();
          showToast('Success', 'User role updated', 'success');
        }
      } catch (error) {
        console.error('Error updating role:', error);
      }
    };

    window.toggleUserStatus = async function(userId, newStatus) {
      try {
        const response = await fetch(`/api/users/${userId}/status`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'x-session-id': sessionId
          },
          body: JSON.stringify({ isActive: newStatus })
        });
        
        if (response.ok) {
          loadSuperadminData();
          showToast('Success', `User ${newStatus ? 'activated' : 'deactivated'}`, 'success');
        }
      } catch (error) {
        console.error('Error updating status:', error);
      }
    };

    window.deleteItinerary = async function(id) {
      if (!confirm('Are you sure you want to delete this itinerary?')) return;
      
      try {
        const response = await fetch(`/api/itinerary/${id}`, {
          method: 'DELETE',
          headers: { 'x-session-id': sessionId }
        });
        
        if (response.ok) {
          loadItineraries();
          showToast('Success', 'Itinerary deleted', 'success');
        }
      } catch (error) {
        console.error('Error deleting itinerary:', error);
      }
    };

    // Role request management functions
    async function loadRoleRequests() {
      try {
        const response = await fetch('/api/role-requests', {
          headers: { 'x-session-id': sessionId }
        });
        const requests = await response.json();
        renderRoleRequests(requests);
        
        // Update pending requests count
        const pendingCount = requests.filter(r => r.status === 'pending').length;
        const pendingElement = document.getElementById('pendingRequests');
        if (pendingElement) {
          pendingElement.textContent = pendingCount;
        }
      } catch (error) {
        console.error('Error loading role requests:', error);
      }
    }

    function renderRoleRequests(requests) {
      const container = document.getElementById('roleRequestsList');
      if (!container) return;

      if (!requests.length) {
        container.innerHTML = '<p class="text-muted">No role requests found.</p>';
        return;
      }

      const pendingRequests = requests.filter(r => r.status === 'pending');
      const reviewedRequests = requests.filter(r => r.status !== 'pending');

      let html = '';

      if (pendingRequests.length > 0) {
        html += '<h6 class="text-warning mb-3">Pending Requests</h6>';
        html += pendingRequests.map(request => `
          <div class="card mb-3 border-warning">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-start">
                <div>
                  <h6 class="fw-bold">${request.userId.name}</h6>
                  <p class="text-muted mb-1">${request.userId.email}</p>
                  <p class="mb-2"><strong>Reason:</strong> ${request.reason}</p>
                  <small class="text-muted">Requested: ${new Date(request.createdAt).toLocaleDateString()}</small>
                </div>
                <div class="d-flex gap-2">
                  <button class="btn btn-success btn-sm" onclick="reviewRoleRequest('${request._id}', 'approved')">
                    Approve
                  </button>
                  <button class="btn btn-danger btn-sm" onclick="reviewRoleRequest('${request._id}', 'rejected')">
                    Reject
                  </button>
                </div>
              </div>
            </div>
          </div>
        `).join('');
      }

      if (reviewedRequests.length > 0) {
        html += '<h6 class="text-secondary mb-3 mt-4">Reviewed Requests</h6>';
        html += reviewedRequests.map(request => `
          <div class="card mb-2 ${request.status === 'approved' ? 'border-success' : 'border-danger'}">
            <div class="card-body py-2">
              <div class="d-flex justify-content-between align-items-center">
                <div>
                  <strong>${request.userId.name}</strong> - 
                  <span class="badge bg-${request.status === 'approved' ? 'success' : 'danger'}">${request.status}</span>
                </div>
                <small class="text-muted">
                  ${new Date(request.reviewedAt).toLocaleDateString()}
                </small>
              </div>
            </div>
          </div>
        `).join('');
      }

      container.innerHTML = html;
    }

    window.reviewRoleRequest = async function(requestId, status) {
      const reviewNotes = prompt(`${status === 'approved' ? 'Approval' : 'Rejection'} notes (optional):`);
      if (reviewNotes === null) return; // User cancelled
      
      try {
        const response = await fetch(`/api/role-requests/${requestId}/review`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'x-session-id': sessionId
          },
          body: JSON.stringify({ status, reviewNotes })
        });
        
        const result = await response.json();
        if (result.success) {
          showToast('Success', result.message, 'success');
          loadRoleRequests();
          loadSuperadminData(); // Refresh user list in case role changed
        } else {
          showToast('Error', result.message, 'error');
        }
      } catch (error) {
        console.error('Error reviewing request:', error);
        showToast('Error', 'Failed to review request', 'error');
      }
    };

    window.loadRoleRequests = loadRoleRequests;
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
