<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register | Travel Itinerary Planner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #fff3e6 0%, #fffaf5 60%);
      min-height: 100vh;
    }
    .auth-card {
      border: none;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
      border-radius: 16px;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="/">Travel Itinerary Planner</a>
      <div class="ms-auto">
        <a class="btn btn-outline-light" href="/login">Login</a>
      </div>
    </div>
  </nav>

  <div class="container d-flex align-items-center justify-content-center" style="min-height: 85vh;">
    <div class="col-12 col-md-6 col-lg-4">
      <div class="card auth-card p-4">
        <div class="card-body">
          <h3 class="card-title fw-bold mb-3 text-center">Create Account</h3>
          <p class="text-muted text-center mb-4">Start planning your next trip</p>

          <form id="registerForm">
            <div class="mb-3">
              <label for="name" class="form-label">Full Name</label>
              <input type="text" class="form-control" id="name" name="name" required>
            </div>
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input type="email" class="form-control" id="email" name="email" required>
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100" id="registerBtn">
              <span class="spinner-border spinner-border-sm d-none me-2" role="status"></span>
              Register
            </button>
          </form>

          <div class="text-center mt-3">
            <span class="text-muted">Already registered?</span>
            <a href="/login" class="ms-1">Login here</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  
  <!-- Success/Error Toast -->
  <div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="messageToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="toast-header">
        <strong class="me-auto" id="toastTitle">Notification</strong>
        <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
      <div class="toast-body" id="toastMessage">
        <!-- Message will be inserted here -->
      </div>
    </div>
  </div>

  <script>
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const registerBtn = document.getElementById('registerBtn');
      const spinner = registerBtn.querySelector('.spinner-border');
      const btnText = registerBtn.childNodes[registerBtn.childNodes.length - 1];
      
      // Show loading state
      spinner.classList.remove('d-none');
      btnText.textContent = ' Registering...';
      registerBtn.disabled = true;
      
      const formData = new FormData(this);
      const data = Object.fromEntries(formData);
      
      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(data)
        });
        
        const result = await response.json();
        
        if (result.success) {
          showToast('Success', result.message, 'success');
          
          // Clear form
          this.reset();
          
          // Redirect after short delay
          setTimeout(() => {
            window.location.href = result.redirect || '/login';
          }, 1500);
        } else {
          showToast('Registration Failed', result.message, 'error');
        }
      } catch (error) {
        console.error('Registration error:', error);
        showToast('Error', 'Network error. Please try again.', 'error');
      } finally {
        // Reset button state
        spinner.classList.add('d-none');
        btnText.textContent = ' Register';
        registerBtn.disabled = false;
      }
    });
    
    function showToast(title, message, type) {
      const toast = document.getElementById('messageToast');
      const toastTitle = document.getElementById('toastTitle');
      const toastMessage = document.getElementById('toastMessage');
      const toastHeader = toast.querySelector('.toast-header');
      
      // Set content
      toastTitle.textContent = title;
      toastMessage.textContent = message;
      
      // Set styling based on type
      toastHeader.className = 'toast-header';
      if (type === 'success') {
        toastHeader.classList.add('bg-success', 'text-white');
      } else if (type === 'error') {
        toastHeader.classList.add('bg-danger', 'text-white');
      }
      
      // Show toast
      const bsToast = new bootstrap.Toast(toast);
      bsToast.show();
    }
  </script>
</body>
</html>
