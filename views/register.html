<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register | Travel Itinerary Planner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #fff3e6 0%, #fffaf5 60%);
      min-height: 100vh;
    }
    .auth-card {
      border: none;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
      border-radius: 16px;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="/">Travel Itinerary Planner</a>
      <div class="ms-auto">
        <a class="btn btn-outline-light" href="/login">Login</a>
      </div>
    </div>
  </nav>

  <div class="container d-flex align-items-center justify-content-center" style="min-height: 85vh;">
    <div class="col-12 col-md-7 col-lg-5">
      <div class="card auth-card p-4">
        <div class="card-body">
          <h3 class="card-title fw-bold mb-3 text-center">Create Account</h3>
          <p class="text-muted text-center mb-4">Start planning your next trip</p>

          <form action="/register" method="POST">
            <div class="mb-3">
              <label for="name" class="form-label">Full Name</label>
              <input type="text" class="form-control" id="name" name="name" required>
            </div>
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input type="email" class="form-control" id="email" name="email" required>
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Register</button>
          </form>

          <div class="text-center mt-3">
            <span class="text-muted">Already registered?</span>
            <a href="/login" class="ms-1">Login here</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
