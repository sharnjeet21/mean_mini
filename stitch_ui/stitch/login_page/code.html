<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;

            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
        }
    </style>

<body class="bg-surface font-body text-on-surface min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
<!-- Ambient Background Elements -->
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary/5 blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-secondary/5 blur-[120px]"></div>
<!-- Main Login Container -->
<div class="w-full max-w-[480px] z-10">
<!-- Brand Identity -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-4xl text-primary" style="font-variation-settings: 'FILL' 1;">explore</span>
</div>
<h1 class="font-headline text-3xl font-extrabold tracking-tight bg-gradient-to-r from-[#667eea] to-[#764ba2] bg-clip-text text-transparent">
                The Elevated Navigator
            </h1>
<p class="text-on-surface-variant mt-2 font-medium">Welcome back to your next adventure.</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl p-8 lg:p-10 shadow-[0_12px_32px_-4px_rgba(25,28,29,0.06)] border border-outline-variant/20">
<form class="space-y-6" onsubmit="return false;">
<!-- Email Field with Validation State -->
<div class="space-y-2">
<label class="block font-headline text-sm font-semibold text-on-surface ml-1" for="email">
                        Email Address
                    </label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-error" data-icon="mail">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border-0 border-b-2 border-error bg-error-container/5 focus:ring-0 focus:border-primary transition-all duration-300 placeholder:text-outline text-on-surface sm:text-sm" id="email" name="email" placeholder="you@example.com" type="email" value="sarah.wanderlust@travel"/>
</div>
<!-- Inline Error Message -->
<div class="flex items-center gap-1.5 mt-1 ml-1">
<span class="material-symbols-outlined text-[14px] text-error" style="font-variation-settings: 'FILL' 1;">error</span>
<p class="text-[11px] font-label font-medium text-error uppercase tracking-wider">Please enter a valid email address</p>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block font-headline text-sm font-semibold text-on-surface ml-1" for="password">
                            Password
                        </label>
<a class="text-xs font-semibold text-secondary hover:text-primary transition-colors duration-200" href="#">
                            Forgot password?
                        </a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-3 border-0 border-b border-outline-variant/40 focus:ring-0 focus:border-b-2 focus:border-primary transition-all duration-300 placeholder:text-outline text-on-surface sm:text-sm bg-transparent" id="password" name="password" placeholder="••••••••" type="password"/>
<div class="absolute inset-y-0 right-0 pr-3 flex items-center">
<button class="text-outline hover:text-on-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="h-4 w-4 text-primary focus:ring-primary/20 border-outline-variant rounded transition-all cursor-pointer" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-sm text-on-surface-variant font-medium cursor-pointer" for="remember-me">
                        Remember my preferences
                    </label>
</div>
<!-- Primary Login Button -->
<button class="signature-gradient w-full flex justify-center py-4 px-4 rounded-xl text-white font-headline font-bold text-sm tracking-wide shadow-lg shadow-primary/20 hover:scale-[1.01] active:scale-[0.98] transition-all duration-200" type="submit">
                    Login to Dashboard
                </button>
</form>
<!-- Social Login Divider -->
<div class="mt-8 relative">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/30"></div>
</div>
<div class="relative flex justify-center text-xs font-label">
<span class="px-3 bg-surface-container-lowest text-outline-variant uppercase tracking-[0.2em] font-bold">Or continue with</span>
</div>
</div>
<!-- Social Login Options -->
<div class="mt-6 grid grid-cols-2 gap-4">
<button class="flex items-center justify-center py-3 px-4 rounded-xl bg-surface-container-low border border-outline-variant/10 hover:bg-surface-container-high transition-colors duration-200 group">
<img alt="Google" class="w-5 h-5 mr-2 grayscale group-hover:grayscale-0 transition-all" data-alt="Official Google G logo in brand colors on a white circular background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAw1b-vWmEKQXzB7q6vbUB5SdsZnPHklFTrtanfuhe5z7Dk__QgNNho7BRpRjkeX7GFQNnA3KN_C6rRyPEedietI7neEr_1x114wTr9bwzOGVvbRQv2XlU27bB1FdqU3cG-i3-iLnS5zy-3jJz0WIN6YJjpUIqcro_kwR-dyykTXwRhhJprqZrzHtbyVOguUE9TNcMlcyTtV8OoJkB5Fq-IH9VIcBHxysK9fl8qwtGCj0DA3qriW8Gi1uRQ7oRaV80uHkzs-rtKDMI"/>
<span class="text-sm font-semibold text-on-surface-variant">Google</span>
</button>
<button class="flex items-center justify-center py-3 px-4 rounded-xl bg-surface-container-low border border-outline-variant/10 hover:bg-surface-container-high transition-colors duration-200 group">
<span class="material-symbols-outlined text-on-surface-variant mr-2" data-icon="travel_explore">travel_explore</span>
<span class="text-sm font-semibold text-on-surface-variant">Passport</span>
</button>
</div>
</div>
<!-- Footer Link -->
<p class="mt-8 text-center text-sm font-medium text-on-surface-variant">
            Don't have an account? 
            <a class="text-primary font-bold hover:underline decoration-2 underline-offset-4 ml-1" href="#">
                Register for early access
            </a>
</p>
<!-- Global Navigation Hint (Contextual Suppression applies, so we show simple help) -->
<div class="mt-12 flex justify-center gap-6 text-[10px] font-label font-bold text-outline-variant uppercase tracking-widest">
<a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="hover:text-primary transition-colors" href="#">Contact Support</a>
</div>
</div>
<!-- Decorative Image Element -->
<div class="fixed top-1/2 right-12 -translate-y-1/2 hidden xl:block w-[400px] h-[600px] pointer-events-none opacity-40">
<div class="w-full h-full rounded-2xl overflow-hidden shadow-2xl rotate-2">
<img alt="Travel Lifestyle" class="w-full h-full object-cover" data-alt="atmospheric photo of a vintage camera and leather journal on a white marble cafe table in Paris, soft morning light" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCZEnxWA_nXjIV_2qDwL-DXfBJmZ88F4gsr6_Yw50H4WH3WKRiOLeEj9WdAF8lOb3DUo0I3vgfesSD3MvTnvWokBD94lal372COfSxWqzpvGD6KCtFS7oNCa16rFnZb6qp62yY1k4Xdjopzn-oVGsT_fTF9qk19_7VpzgYhmYirNvK35r9ex84xE6lJJja_sxvWn18Etul56xfySbofRpeCNgeP7wNwamG8EVomztvYFuC5OoZzRBEHbWPDTtqfCxjZfXKuq3oNII4"/>
</div>
</div>
