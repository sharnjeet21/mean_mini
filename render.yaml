services:
  - type: web
    name: travel-backend
    runtime: node
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: UNSPLASH_ACCESS_KEY
        sync: false

  - type: web
    name: travel-frontend
    runtime: static
    plan: free
    buildCommand: cd frontend && npm install && npx ng build
    staticPublishPath: ./frontend/dist/frontend/browser